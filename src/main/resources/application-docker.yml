# 容器部署（Docker / 云平台）：激活方式 SPRING_PROFILES_ACTIVE=docker
server:
  # Render / Railway / Fly.io 等平台会注入 PORT
  port: ${PORT:8080}

multimodal:
  vision:
    python-cmd: python3
  audio:
    python-cmd: python3
  video:
    # 镜像内不按装 torch/transformers 时关掉 BLIP，避免启动或调用报错
    visual-caption-enabled: false
